<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>登録が完了しました</h1>
    <p>KanseiLink Pro / Team プランへようこそ。<br>全てのプレミアムコンテンツにアクセスできます。</p>
    <a href="/insights/" class="btn">レポートを読む</a>
    <div class="sub">
      <a href="#" id="portal-link">サブスクリプション管理</a>
      &nbsp;·&nbsp;
      <a href="/subscription/login.html">APIキー発行・アカウント</a>
    </div>
    <p class="sub" style="margin-top:12px;">別の端末で読む場合は、<a href="/subscription/login.html">ログインページ</a>からメールのログインリンクでサインインできます。</p>
  </div>
  <script>
    // Exchange the Stripe checkout session for an access token, then store it for the paywall.
    // The session_id is unforgeable + Stripe-verified, so this is how a real subscriber obtains
    // their per-email token (the old flow asked the user to type their email, which the API no
    // longer trusts on its own — that was an email→subscription enumeration hole).
    (function() {
      var API_BASE = window.KANSEI_API_BASE || "https://kansei-link-mcp-production-b054.up.railway.app";
      var params = new URLSearchParams(window.location.search);
      var sessionId = params.get('session_id');

      function wirePortal(email, token) {
        var portalLink = document.getElementById('portal-link');
        if (!portalLink || !email || !token) return;
        portalLink.addEventListener('click', function(e) {
          e.preventDefault();
          var xhr = new XMLHttpRequest();
          xhr.open('POST', API_BASE + '/api/portal');
          xhr.setRequestHeader('Content-Type', 'application/json');
          xhr.onload = function() {
            if (xhr.status === 200) {
              try { var d = JSON.parse(xhr.responseText); if (d.url) window.location.href = d.url; } catch (e) {}
            }
          };
          xhr.send(JSON.stringify({ email: email, token: token }));
        });
      }

      if (sessionId) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', API_BASE + '/api/access-token?session_id=' + encodeURIComponent(sessionId));
        xhr.onload = function() {
          if (xhr.status === 200) {
            try {
              var d = JSON.parse(xhr.responseText);
              if (d.email && d.token) {
                localStorage.setItem('kl_email', d.email);
                localStorage.setItem('kl_token', d.token);
                localStorage.removeItem('kl_access'); // bust paywall cache so premium unlocks immediately
                wirePortal(d.email, d.token);
              }
            } catch (e) {}
          }
        };
        xhr.send();
      } else {
        // No session_id (direct visit) — wire the portal from whatever is already stored.
        wirePortal(localStorage.getItem('kl_email'), localStorage.getItem('kl_token'));
      }
    })();
  </script>
</body>
