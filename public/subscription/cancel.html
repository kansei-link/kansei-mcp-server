<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登録キャンセル | KanseiLink</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #00bfa5; --bg: #f8fafb; --text: #1a2332; --gray: #6b7280; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 48px 40px; max-width: 480px; width: 90%; text-align: center; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: var(--gray); line-height: 1.7; margin-bottom: 24px; font-size: 15px; }
    .btn { display: inline-block; padding: 12px 32px; background: var(--teal); color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; }
    .btn:hover { opacity: 0.9; }
    .btn-outline { display: inline-block; padding: 12px 32px; border: 2px solid var(--teal); color: var(--teal); border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; margin-left: 12px; }
  </style>
  <link rel="alternate" hreflang="ja" href="https://kansei-link.com/subscription/cancel.html" />
  <link rel="alternate" hreflang="en" href="https://kansei-link.com/en/subscription/cancel.html" />
  <link rel="alternate" hreflang="x-default" href="https://kansei-link.com/subscription/cancel.html" />
</head>
<body>
  <div class="card">
    <div class="icon">&#8592;</div>
    <h1>登録をキャンセルしました</h1>
    <p>決済は完了していません。<br>無料コンテンツは引き続きご利用いただけます。</p>
    <a href="/insights/" class="btn">無料レポートを読む</a>
    <a href="/insights/" class="btn-outline">料金プランを確認</a>
  </div>
</body>
</html>
