name: Reconnaissance Ant

# Daily crawl of all Synapse Arrows products from inside KanseiLINK MCP.
# See scripts/reconnaissance/README.md
# Pattern: https://github.com/michielinksee/synapse-arrows-playbook/blob/main/02-process/reconnaissance-ant.md

on:
  schedule:
    # 00:00 UTC = 09:00 JST. Daily.
    - cron: "0 0 * * *"
  workflow_dispatch:
    # Manual trigger for testing or ad-hoc runs.
    inputs:
      product:
        description: "Single product to monitor (e.g. scanavi). Leave empty for all."
        required: false
        type: string

permissions:
  contents: write  # Required to commit the report back to the repo

jobs:
  reconnaissance:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a token that can push back to main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run reconnaissance
        id: recon
        continue-on-error: true
        run: |
          if [ -n "${{ github.event.inputs.product }}" ]; then
            node scripts/reconnaissance/run.mjs --product=${{ github.event.inputs.product }}
          else
            node scripts/reconnaissance/run.mjs
          fi

      - name: Configure git for commit
        run: |
          git config user.name "reconnaissance-ant"
          git config user.email "michie.y@synapse-arrows.com"

      - name: Commit daily report
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT_PATH="data/reconnaissance/reports/${DATE}.md"
          if [ -f "$REPORT_PATH" ]; then
            git add "$REPORT_PATH"
            if git diff --cached --quiet; then
              echo "No report changes to commit"
            else
              git commit -m "chore(recon): daily report ${DATE}

              Auto-generated by reconnaissance ant.
              Recon exit code: ${{ steps.recon.outcome }}"
              git push
            fi
          else
            echo "No report file found at $REPORT_PATH"
          fi

      - name: Fail step if recon detected critical findings
        if: steps.recon.outcome == 'failure'
        run: |
          echo "::warning::Reconnaissance ant detected CRITICAL findings — see today's report"
          exit 1
